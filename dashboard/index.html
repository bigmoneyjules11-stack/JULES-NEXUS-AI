<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JULES NEXUS AI Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0b1020;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:260px;
background:#111827;
padding:25px;
box-sizing:border-box;
}

.sidebar h2{
margin-top:0;
color:#38bdf8;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar li{
padding:15px 0;
border-bottom:1px solid rgba(255,255,255,.08);
cursor:pointer;
}

.content{
flex:1;
padding:40px;
}

.card{
background:#1a2238;
padding:30px;
border-radius:16px;
margin-bottom:25px;
}

button{
background:#0ea5e9;
color:white;
border:none;
padding:15px 28px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0284c7;
}
</style>

</head>

<body>

<div class="sidebar">

<h2>JULES NEXUS AI</h2>

<ul>
<li>🏠 Dashboard</li>
<li>🤖 AI Assistant</li>
<li>📁 Files</li>
<li>📊 Analytics</li>
<li>⚙ Settings</li>
</ul>

</div>

<div class="content">

<div class="card">
<h1>Welcome</h1>
<p>This is the beginning of the real JULES NEXUS AI platform.</p>

<button onclick="alert('AI Platform Coming Soon')">
Open AI Assistant
</button>

</div>

<div class="card">
<h2>Platform Status</h2>

<p>✔ Dashboard Online</p>
<p>✔ Frontend Connected</p>
<p>✔ Ready For Development</p>

</div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
